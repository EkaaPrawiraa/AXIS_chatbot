name: guardrail_pre_gen
description: Layer 3 pre-generation guardrail. Crisis signal detection that backs up Layer 2.
layer: guardrail
language: bilingual
version: 1.1
tags: [layer3, pre_gen, semantic]
notes: |
  Detector: asymmetric token-containment (how much of a known crisis
  phrase's own tokens appear in the message), gated by a minimum
  shared-content-word count so short phrases padded with common
  function words ("aku", "ada", "nggak") cannot match on incidental
  overlap. Replaced the previous Dice (symmetric) coefficient, which
  was found to structurally under-trigger on real full-sentence
  messages: Dice divides by the combined size of both token sets, so
  a short 3-4 word canonical phrase compared against a full
  conversational sentence (10+ words) almost never crosses 0.6
  regardless of how closely the message paraphrases the phrase.
system: |
  CRISIS_SIGNAL_PHRASES:
    - ingin mengakhiri hidupnya
    - mau bunuh diri
    - tidak ada harapan lagi
    - gak ada harapan lagi
    - ga ada harapan lagi
    - hidupku sudah tidak ada artinya
    - semua tidak berarti bagiku
    - semua sudah tidak berarti
    - aku ingin pergi selamanya
    - want to end it all
    - no point in living
    - better off dead
    - I cant do this anymore
    - jadi beban buat orang lain
    - dunia lebih baik tanpa aku
    - ingin menghilang selamanya
    - tidak usah bangun lagi besok
    - ingin semuanya cepat berakhir
    - capek menjalani hidup seperti ini
    - dunia tidak akan kehilangan apa-apa kalau aku pergi
    - ingin pergi jauh dan tidak kembali
    - semua akan lebih tenang tanpa aku
    - ingin istirahat panjang selamanya

  CRISIS_SEMANTIC_THRESHOLD: 0.4
  CRISIS_MIN_CONTENT_OVERLAP: 1

  ON_MATCH_ACTION: route_to_crisis_escalation
