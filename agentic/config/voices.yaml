    label_en: "Arif"
    gender: "male"
    language: "id"
    persona: "grounded, steady, low pitch"
    elevenlabs_voice_id: "LMO8Em46czmXgX8nuxIU"
    openai_fallback_voice: "cedar"
    notes: "Calm masculine voice for grounding exercises."

  budi_friendly_male:
    label_id: "Budi"
    label_en: "Budi"
    gender: "male"
    language: "id"
    persona: "friendly, conversational, mid twenties tone"
    elevenlabs_voice_id: "i8CJLmX03JoyL7Dl2LaT"
    openai_fallback_voice: "cedar"
    notes: "Warm conversational baseline."

  # ── English voices ─────────────────────────────────────────────
  emma_warm_female:
