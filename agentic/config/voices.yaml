# Quota fallback policy
fallback:
  on_elevenlabs_quota_exceeded: "openai_tts1"
  on_all_failed: "text_only"
  openai_tts_model: "gpt-4o-mini-tts"
  openai_tts_format: "mp3"
  openai_tts_instructions: >-
    Speak naturally in the input language. Keep one consistent voice profile.
    Use lively, warm, conversational pacing with gentle variation. Do not
    translate. Avoid robotic, flat, theatrical, or overly cheerful delivery.
