# Voice catalog for the TTS layer.
#
# Each entry pairs a stable internal id with the provider-specific id.
# Users pick one of these via the UI; the TTS node resolves the entry
# at request time. Replace the elevenlabs_voice_id placeholders with
# real ids once you have selected the voices on ElevenLabs.
#
# Layout: 4 Indonesian voices (2F + 2M) and 4 English voices (2F + 2M).
# When the user has not chosen a voice, the catalog picks the default
# for the resolved language. Phase 1 ElevenLabs free tier supports
# Multilingual v2 and v3 alpha.

# Default voice per language. The TTS node passes the resolved
# language and falls through to ``default_voice`` only when no
# language match is found.
default_voice: "nura_warm_female"

default_voice_by_language:
  id: "nura_warm_female"
  en: "sarah_clear_female"

voices:
  # ── Indonesian voices ──────────────────────────────────────────
  nura_warm_female:
    label_id: "Nura"
    label_en: "Nura"
    gender: "female"
    language: "id"
    persona: "warm, calm, late twenties tone"
    elevenlabs_voice_id: "hpp4J3VqNfWAUOO0d1Us"
    openai_fallback_voice: "cedar"
    notes: "Default Indonesian voice. Curated for empathic listening."

  rini_clear_female:
    label_id: "Rini"
    label_en: "Rini"
    gender: "female"
    language: "id"
    persona: "clear, friendly, mid twenties tone"
    elevenlabs_voice_id: "WQ4h6sgS9p2XXvLsESBT"
    openai_fallback_voice: "cedar"
    notes: "Brighter timbre. Suitable for celebratory moments."

  arif_grounded_male:
