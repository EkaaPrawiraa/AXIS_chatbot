    <ellipse cx="833" cy="498" rx="24" ry="13" transform="rotate(-42 833 498)" fill="#FFFFFF" opacity="0.32"/>
    <ellipse cx="758" cy="682" rx="24" ry="13" transform="rotate(-42 758 682)" fill="#FFFFFF" opacity="0.32"/>
    <ellipse cx="588" cy="510" rx="24" ry="13" transform="rotate(-42 588 510)" fill="#FFFFFF" opacity="0.32"/>
