    <circle cx="512" cy="828" r="58"/>
    <circle cx="233" cy="326" r="58"/>
    <circle cx="175" cy="512" r="58"/>
    <circle cx="250" cy="696" r="58"/>
    <circle cx="791" cy="326" r="58"/>
    <circle cx="849" cy="512" r="58"/>
    <circle cx="774" cy="696" r="58"/>

