    <ellipse cx="497" cy="182" rx="24" ry="13" transform="rotate(-42 497 182)" fill="#FFFFFF" opacity="0.32"/>
    <ellipse cx="497" cy="814" rx="24" ry="13" transform="rotate(-42 497 814)" fill="#FFFFFF" opacity="0.32"/>
