services:
  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/yourpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - ./infra/neo4j/schema:/schema
      - ./infra/neo4j/migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p yourpassword 'RETURN 1'"]
      interval: 20s
      timeout: 10s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: companion_chatbot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/000_init.sql
      - ./infra/postgres/pgvector_init.sql:/docker-entrypoint-initdb.d/010_pgvector_init.sql
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companion -d companion_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://companion:devpassword@postgres:5432/companion_chatbot?sslmode=disable",
        "up"
      ]
    restart: "no"

  agentic:
    build:
      context: .
      dockerfile: agentic/Dockerfile
    env_file:
      - agentic/.env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEFAULT_USER_LANGUAGE: ${DEFAULT_USER_LANGUAGE:-id}
      GUARDRAIL_AUDIT_ENABLED: ${GUARDRAIL_AUDIT_ENABLED:-1}
      # ── Runtime / FastAPI ────────────────────────────────────────────
      AGENTIC_HOST: 0.0.0.0
      AGENTIC_PORT: 8000
      AGENTIC_LOG_LEVEL: ${AGENTIC_LOG_LEVEL:-info}
      AGENTIC_RELOAD: ${AGENTIC_RELOAD:-0}
      AGENTIC_CORS_ORIGINS: ${AGENTIC_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001}
      AGENTIC_GATEWAY_PRIVATE_KEY: ${AGENTIC_GATEWAY_PRIVATE_KEY:-dev-secret}
      AGENTIC_GATEWAY_PRIVATE_KEY_HEADER: ${AGENTIC_GATEWAY_PRIVATE_KEY_HEADER:-X-Agentic-Private-Key}
      AGENTIC_ENABLE_DOCS: ${AGENTIC_ENABLE_DOCS:-1}
      # ── Storage ──────────────────────────────────────────────────────
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: yourpassword
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_POOL_SIZE: ${NEO4J_POOL_SIZE:-50}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: companion
      PG_PASSWORD: devpassword
      PG_DATABASE: companion_chatbot
      PG_POOL_MIN_SIZE: ${PG_POOL_MIN_SIZE:-1}
      PG_POOL_MAX_SIZE: ${PG_POOL_MAX_SIZE:-10}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      # ── LLM providers ────────────────────────────────────────────────
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.2}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_TEMPERATURE: ${ANTHROPIC_TEMPERATURE:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-}
      GROQ_TEMPERATURE: ${GROQ_TEMPERATURE:-}
      GROQ_MAX_COMPLETION_TOKENS: ${GROQ_MAX_COMPLETION_TOKENS:-}
      LLM_MODEL_CHEAP: ${LLM_MODEL_CHEAP:-gpt-4o-mini}
      LLM_MODEL_STRONG: ${LLM_MODEL_STRONG:-gpt-4o}
      # ── Speech / audio ───────────────────────────────────────────────
      OPENAI_TRANSCRIBE_MODEL: ${OPENAI_TRANSCRIBE_MODEL:-gpt-4o-mini-transcribe}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_MODEL_REALTIME: ${ELEVENLABS_MODEL_REALTIME:-eleven_flash_v2_5}
      ELEVENLABS_MODEL_PRERENDERED: ${ELEVENLABS_MODEL_PRERENDERED:-eleven_multilingual_v2}
      ELEVENLABS_OUTPUT_FORMAT: ${ELEVENLABS_OUTPUT_FORMAT:-mp3_44100_128}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      OPENAI_TTS_FORMAT: ${OPENAI_TTS_FORMAT:-mp3}
      OPENAI_TTS_INSTRUCTIONS: ${OPENAI_TTS_INSTRUCTIONS:-}
      # ── Tools ────────────────────────────────────────────────────────
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      OPENAI_WEBSEARCH_MODEL: ${OPENAI_WEBSEARCH_MODEL:-gpt-4o-mini-search-preview}
      # ── Background workers ───────────────────────────────────────────
      AXIS_GRAPH_STATE_LOG: ${AXIS_GRAPH_STATE_LOG:-debug}
      AXIS_GRAPH_TIMING_LOG: ${AXIS_GRAPH_TIMING_LOG:-0}
      MEMORY_DECAY_ENABLED: ${MEMORY_DECAY_ENABLED:-1}
      SESSION_SWEEPER_ENABLED: ${SESSION_SWEEPER_ENABLED:-1}
      SWEEPER_IDLE_MINUTES: ${SWEEPER_IDLE_MINUTES:-30}
      SWEEPER_POLL_INTERVAL_SECONDS: ${SWEEPER_POLL_INTERVAL_SECONDS:-60}
      SWEEPER_BATCH_LIMIT: ${SWEEPER_BATCH_LIMIT:-25}
      SWEEPER_CHECKPOINT_MESSAGE_THRESHOLD: ${SWEEPER_CHECKPOINT_MESSAGE_THRESHOLD:-16}
      SWEEPER_RECOVERY_ENABLED: ${SWEEPER_RECOVERY_ENABLED:-1}
      SWEEPER_RECOVERY_INTERVAL_HOURS: ${SWEEPER_RECOVERY_INTERVAL_HOURS:-12}
      SWEEPER_RECOVERY_COOLDOWN_HOURS: ${SWEEPER_RECOVERY_COOLDOWN_HOURS:-12}
    ports:
      - "8000:8000"
    volumes:
      - ./agentic:/app/agentic
      - ./utility:/app/utility
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy

  backend-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/app/gateway"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_PORT_MAIN: 3001
      AUTH_SERVICE_URL: http://backend-auth:8083
      CHAT_SERVICE_URL: http://backend-chat:8081
      MEMORY_SERVICE_URL: http://backend-memory:8082
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      AGENTIC_BASE_URL: http://agentic:8000
      AGENTIC_GATEWAY_PRIVATE_KEY: ${AGENTIC_GATEWAY_PRIVATE_KEY:-dev-secret}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      PUBLIC_AGENTIC_PROXY_ENABLED: ${PUBLIC_AGENTIC_PROXY_ENABLED:-0}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
    ports:
      - "3001:3001"
    depends_on:
      backend-auth:
        condition: service_started
      backend-chat:
        condition: service_started
      backend-memory:
        condition: service_started
      redis:
        condition: service_healthy

  backend-auth:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/app/auth"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_PORT_AUTH: 8083
      POSTGRES_DSN: postgres://companion:devpassword@postgres:5432/companion_chatbot?sslmode=disable
      POSTGRES_MAX_OPEN_CONNS: ${POSTGRES_MAX_OPEN_CONNS:-20}
      POSTGRES_MAX_IDLE_CONNS: ${POSTGRES_MAX_IDLE_CONNS:-5}
      POSTGRES_CONN_MAX_LIFETIME: ${POSTGRES_CONN_MAX_LIFETIME:-30m}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      MEMORY_SERVICE_URL: http://backend-memory:8082
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully

  backend-chat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/app/chat"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_PORT_CHAT: 8081
      POSTGRES_DSN: postgres://companion:devpassword@postgres:5432/companion_chatbot?sslmode=disable
      POSTGRES_MAX_OPEN_CONNS: ${POSTGRES_MAX_OPEN_CONNS:-20}
      POSTGRES_MAX_IDLE_CONNS: ${POSTGRES_MAX_IDLE_CONNS:-5}
      POSTGRES_CONN_MAX_LIFETIME: ${POSTGRES_CONN_MAX_LIFETIME:-30m}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      AGENTIC_BASE_URL: http://agentic:8000
      AGENTIC_GATEWAY_PRIVATE_KEY: ${AGENTIC_GATEWAY_PRIVATE_KEY:-dev-secret}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
      agentic:
        condition: service_started

  backend-memory:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/app/memory"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_PORT_MEMORY: 8082
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: yourpassword
      NEO4J_MAX_POOL_SIZE: ${NEO4J_MAX_POOL_SIZE:-50}
      NEO4J_ACQUIRE_TIMEOUT: ${NEO4J_ACQUIRE_TIMEOUT:-60s}
      NEO4J_TX_RETRY_TIME: ${NEO4J_TX_RETRY_TIME:-30s}
      AGENTIC_BASE_URL: http://agentic:8000
      AGENTIC_GATEWAY_PRIVATE_KEY: ${AGENTIC_GATEWAY_PRIVATE_KEY:-dev-secret}
    ports:
      - "8082:8082"
    depends_on:
      neo4j:
        condition: service_healthy
      agentic:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend-gateway:
        condition: service_started

volumes:
  neo4j_data:
  postgres_data:
  redis_data:
  frontend_node_modules:
